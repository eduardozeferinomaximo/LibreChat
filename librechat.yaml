version: "1.1.5"

cache: true

# Configurações do Google Gemini
endpoints:
  google:
    models:
      default: ["gemini-1.5-flash"]
      fetch: false # Importante: mude para false
    modelDisplayLabel: "Mentor Gemini"

# Configurações de busca em arquivos (RAG)
fileConfig:
  endpoints:
    google:
      disabled: false
      fileLimit: 20
      fileSizeLimit: 512

# Interface
interface:
  privacyPolicy:
    externalUrl: 'https://sua-ong.org/privacidade'
